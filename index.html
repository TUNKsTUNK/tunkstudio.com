    /* The SPA router (see app.jsx) uses history.pushState to show real paths
       like /work/postane, without reloading this document. Any relative URL
       used AFTER that point (e.g. an <img src="assets/..."> rendered by
       React while on /work) would resolve against /work/ instead of the
       real site root — 404. Fix this once, at initial parse time, by
       pinning a <base> to the directory this document actually loaded
       from. This must be computed now (from the real, pre-pushState
       pathname) — recomputing later from a pushState'd pathname would be
       wrong. On a real static host, that directory is always "/"; in a
       sandboxed preview that serves this file from a nested path, it's
       whatever that nested directory is. Either way, the <base> tag then
       stays fixed through all later client-side navigation. */
    (function () {
      var p = window.location.pathname;
      var root = /\/index\.html?$/i.test(p) ? p.replace(/index\.html?$/i, '') : '/';
      var base = document.createElement('base');
      base.href = root;
      document.head.appendChild(base);
    })();

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {

function TweakToggle({ label, value, onChange }) {

              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;

}

function TweakText({ label, value, placeholder, onChange }) {

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

const { useState, useEffect, useRef } = React;

/* ---------- scroll-reveal (brand-legal: opacity + small translate) ----------
   IntersectionObserver is unreliable inside preview iframes, so we use a
   shared rAF/scroll checker against getBoundingClientRect, plus a hard
   fallback that reveals everything after a beat — content is never stuck. */
const _revealEls = new Set();
let _revealWired = false;
function _checkReveals() {
  const vh = window.innerHeight || 800;
  _revealEls.forEach((el) => {
    const top = el.getBoundingClientRect().top;
    if (top < vh * 0.92) {
      const d = +el.dataset.revealDelay || 0;
      setTimeout(() => el.classList.add('in'), d);
      _revealEls.delete(el);
    }
  });
}
function _wireReveals() {
  if (_revealWired) return;
  _revealWired = true;
  window.addEventListener('scroll', _checkReveals, { passive: true });
  window.addEventListener('resize', _checkReveals);
}
function _registerReveal(el, delay) {
  if (!el) return;
  el.dataset.revealDelay = delay || 0;
  _revealEls.add(el);
  _wireReveals();
  requestAnimationFrame(() => requestAnimationFrame(_checkReveals));
  // hard safety: never leave anything hidden
  setTimeout(() => {if (_revealEls.has(el)) {el.classList.add('in');_revealEls.delete(el);}}, 1600);
}

function Reveal({ as = 'div', delay = 0, className = '', style = {}, children, ...rest }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;if (!el) return;
    el.classList.remove('in');
    _registerReveal(el, delay);
  }, [delay]);
  const Tag = as;
  return <Tag ref={ref} className={`reveal ${className}`} style={style} {...rest}>{children}</Tag>;
}

/* ---------- lazy video — only downloads/plays once scrolled near viewport ---------- */
function LazyVideo({ src, className = '', onSized }) {
  const ref = useRef(null);
  const [armed, setArmed] = useState(false);
  const [muted, setMuted] = useState(true);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) { setArmed(true); io.disconnect(); }
    }, { rootMargin: '600px 0px' }); // start loading a bit before it's on screen
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return (
    <div className="lazyvid-wrap">
      <video
        ref={ref}
        className={className}
        src={armed ? src : undefined}
        autoPlay={armed} playsInline preload="none" loop muted={muted}
        onLoadedMetadata={(e) => {
          const v = e.target;
          if (v.videoWidth && v.videoHeight) {
            const fig = v.closest('.g-vid');
            if (fig) fig.style.aspectRatio = v.videoWidth + ' / ' + v.videoHeight;
          }
          if (onSized) onSized(v.videoWidth, v.videoHeight);
        }}
      />
      {/* browsers only allow autoplay when muted — this lets the visitor opt into sound with one tap */}
      <button
        className="lazyvid-mute" aria-label={muted ? 'Unmute' : 'Mute'}
        onClick={(e) => { e.stopPropagation(); setMuted((m) => !m); }}
      >
        {muted ? 'SOUND OFF' : 'SOUND ON'}
      </button>
    </div>
  );
}

/* ---------- lightbox — fullscreen image viewer with prev/next + swipe ---------- */
function Lightbox({ images = [], index = 0, title = '', onClose }) {
  const [i, setI] = useState(index);
  useEffect(() => {setI(index);}, [index]);
  const n = images.length;
  const go = (d) => setI((v) => (v + d + n) % n);
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();else
      if (e.key === 'ArrowRight') go(1);else
      if (e.key === 'ArrowLeft') go(-1);
    };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => {window.removeEventListener('keydown', onKey);document.body.style.overflow = '';};
  }, [n]);
  // swipe
  const tx = useRef(null);
  const onTS = (e) => {tx.current = e.touches[0].clientX;};
  const onTE = (e) => {
    if (tx.current == null) return;
    const dx = e.changedTouches[0].clientX - tx.current;
    if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
    tx.current = null;
  };
  if (!n) return null;
  return (
    <div className="lb" onClick={onClose} onTouchStart={onTS} onTouchEnd={onTE}>
      <div className="lb-top" onClick={(e) => e.stopPropagation()}>
        <span className="lab" style={{ color: 'var(--paper)' }}>{title}</span>
        <span className="lab" style={{ color: 'var(--paper)' }}>{String(i + 1).padStart(2, '0')} / {String(n).padStart(2, '0')}</span>
        <button className="lb-x" aria-label="Close" onClick={onClose}>✕</button>
      </div>
      <button className="lb-arrow prev" aria-label="Previous" onClick={(e) => {e.stopPropagation();go(-1);}}>←</button>
      <img className="lb-img" src={images[i]} alt={`${title} ${i + 1}`} onClick={(e) => e.stopPropagation()} />
      <button className="lb-arrow next" aria-label="Next" onClick={(e) => {e.stopPropagation();go(1);}}>→</button>
      <div className="lb-dots" onClick={(e) => e.stopPropagation()}>
        {images.map((s, k) =>
        <button key={k} className={`dot ${k === i ? 'on' : ''}`} aria-label={`Image ${k + 1}`} onClick={() => setI(k)} />
        )}
      </div>
    </div>);

}

function HeroFeature({ go }) {
  const h = DATA.home;
  // Homepage slideshow: one strong image per photographed project, in curated order.
  // Each slide links to its own project, so the hero showcases the whole studio.
  const order = ['parfumlab-pneuma', 'oculus', 'postane', 'samih-rifat', 'hali-atolyesi', 'paintshop', 'liminal'];
  const featured = order
    .map((s) => DATA.projects.find((p) => p.slug === s))
    .filter((p) => p && hasPhotos(p));
  const slides = featured.length
    ? featured.map((p) => ({ img: p.hero, p }))
    : [{ img: null, p: DATA.projects[0] }];

  const [i, setI] = useState(0);
  const [paused, setPaused] = useState(false);
  const [op, setOp] = useState(1); // opacity of the incoming (top) layer
  const prevRef = useRef(0); // index of the image held on the bottom layer
  useEffect(() => {
    if (paused || slides.length < 2) return;
    const id = setInterval(() => setI((n) => (n + 1) % slides.length), 3000);
    return () => clearInterval(id);
  }, [paused, slides.length]);
  // Preload only the NEXT slide's image (not all of them) so the crossfade stays
  // instant without forcing the browser to download every project's hero at once
  // on first paint — that alone was several MB of unseen images.
  useEffect(() => {
    const next = slides[(i + 1) % slides.length];
    if (next && next.img) { const im = new Image(); im.src = next.img; }
  }, [i, slides]);
  // Smooth crossfade: bottom layer holds the previous image at full opacity while
  // the incoming image fades in on top (many small JS steps — CSS transitions
  // freeze in this preview compositor, but timers run, so this stays smooth).
  useEffect(() => {
    setOp(0);
    const steps = 20,dur = 500;
    let s = 0;
    const id = setInterval(() => {
      s += 1;
      const t = s / steps;
      setOp(t < 1 ? (1 - Math.cos(t * Math.PI)) / 2 : 1); // ease-in-out
      if (s >= steps) {clearInterval(id);prevRef.current = i;}
    }, dur / steps);
    return () => clearInterval(id);
  }, [i]);

  const cur = slides[i].p;
  const loc = cur.location ? cur.location.split(',')[0].toUpperCase() : 'ISTANBUL';
  const curImg = slides[i].img;
  const prevImg = slides[prevRef.current] ? slides[prevRef.current].img : curImg;

  return (
    <section className="hero-full">
      <div className="heroB" onMouseEnter={() => setPaused(true)} onMouseLeave={() => setPaused(false)}>
        {/* bottom layer: previous image, held full-opacity (no dark gap) */}
        <div className="album-photo" style={{ backgroundImage: prevImg ? `url(${prevImg})` : 'none' }} />
        {/* top layer: incoming image fading in */}
        <div className="album-photo" onClick={() => go({ id: 'project', project: cur })}
        style={{ backgroundImage: curImg ? `url(${curImg})` : 'none', opacity: op, cursor: 'pointer' }} />
        <div className="scrim" />
        <div className="overlay-top">
          <span className="lab" style={{ color: 'rgba(255,255,255,.85)' }}>{h.eyebrow}</span>
        </div>
        <div className="overlay-bottom">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "hero": "feature",
  "typeScale": 0.5,
  "density": "regular",
  "accent": "#0A0A0A",
  "motion": true
}/*EDITMODE-END*/;

const DENSITY_M = {
  compact:  "clamp(12px, 3.5vw, 56px)",
  regular:  "clamp(14px, 5vw, 96px)",
  spacious: "clamp(20px, 7vw, 132px)",
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Real, crawlable paths (not #hash) — search engines index /work/postane as
  // its own URL. Netlify's _redirects file sends any path to index.html so
  // direct loads/refreshes/shared links still resolve.
  const encodePage = (p) => {
    if (p.id === 'project' && p.project) return '/work/' + encodeURIComponent(p.project.slug);
    if (p.id === 'home') return '/';
    return '/' + p.id;
  };
  const decodePath = (pathname) => {
    const h = (pathname || '/').replace(/^\/|\/$/g, '');
    if (!h) return { id: 'home' };
    const parts = h.split('/');
    if (parts[0] === 'work' && parts[1]) {
      const slug = decodeURIComponent(parts[1]);
      const project = DATA.projects.find((pr) => pr.slug === slug);
      if (project) return { id: 'project', project };
      return { id: 'work' };
    }
    if (['work', 'about', 'press', 'contact'].includes(parts[0])) return { id: parts[0] };
    return { id: 'home' };
  };

  const [page, setPage] = useState(() => decodePath(window.location.pathname));

  // Pushes a new history entry (real navigation, e.g. clicking a link/tile).
  const go = (p) => {
    setPage(p);
    const path = encodePage(p);
    if (window.location.pathname !== path) window.history.pushState({ page: p.id }, '', path);
    window.scrollTo({ top: 0, behavior: 'auto' });
  };

  // Back/forward button: read the new path, update state, but don't push again.
  useEffect(() => {
    const onPop = () => {
      setPage(decodePath(window.location.pathname));
      window.scrollTo({ top: 0, behavior: 'auto' });
    };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  // Per-page SEO: title, meta description, canonical, Open Graph/Twitter
  // cards, and a JSON-LD block (Organization sitewide, CreativeWork per
  // project) — this is what search engines and shared-link previews read.
  useEffect(() => { applySEO(page); }, [page]);

  // apply tweaks to :root
  useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--tscale', String(t.typeScale));
    r.style.setProperty('--m', DENSITY_M[t.density] || DENSITY_M.regular);
    r.style.setProperty('--accent', t.accent);
    r.style.setProperty('--reveal-y', t.motion ? '10px' : '0px');
    r.classList.toggle('no-motion', !t.motion);
  }, [t.typeScale, t.density, t.accent, t.motion]);

  const darkHero = (page.id === 'home' && t.hero === 'feature') || page.id === 'project';

  let view;
  if (page.id === 'home') view = <HomePage go={go} hero={t.hero} />;
  else if (page.id === 'work') view = <WorkPage go={go} />;
  else if (page.id === 'project') view = <ProjectPage project={page.project} go={go} />;
  else if (page.id === 'about') view = <AboutPage go={go} />;
  else if (page.id === 'press') view = <PressPage go={go} />;
  else if (page.id === 'contact') view = <ContactPage go={go} />;
  else view = <HomePage go={go} hero={t.hero} />;

  return (
    <React.Fragment>
      <Nav page={page} go={go} dark={darkHero} key={page.id + '-' + t.hero} />
      {view}
      <Footer go={go} />

      <TweaksPanel>
        <TweakSection label="Hero" />
        <TweakRadio label="Direction" value={t.hero}
          options={['statement', 'feature', 'index']}
          onChange={(v) => setTweak('hero', v)} />

        <TweakSection label="Layout" />
        <TweakSlider label="Display type" value={t.typeScale} min={0.4} max={1.3} step={0.05}
          onChange={(v) => setTweak('typeScale', v)} />
        <TweakRadio label="Density" value={t.density}
          options={['compact', 'regular', 'spacious']}
          onChange={(v) => setTweak('density', v)} />

        <TweakSection label="Accent" subtitle="Brand reserves colour for real project material — loosen with care" />
        <TweakColor label="Page accent" value={t.accent}
          options={['#0A0A0A', '#1C3FBF', '#D4271E', '#C97A1A']}
          onChange={(v) => setTweak('accent', v)} />

        <TweakSection label="Motion" />
        <TweakToggle label="Scroll reveal" value={t.motion}
          onChange={(v) => setTweak('motion', v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
