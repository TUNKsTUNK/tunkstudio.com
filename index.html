/* -------------------------------------------------------------------------
   Deep-merge helper — local edits override defaults at any depth.
   ------------------------------------------------------------------------- */
function TUNK_DEEP_MERGE(base, override) {
  if (override === undefined || override === null) return base;
  if (Array.isArray(base) || Array.isArray(override)) return override;
  if (typeof base !== "object" || typeof override !== "object") return override;
  const out = {};
  const keys = new Set([...Object.keys(base || {}), ...Object.keys(override || {})]);
  keys.forEach(k => { out[k] = TUNK_DEEP_MERGE(base ? base[k] : undefined, override[k]); });
  return out;
}

window.TUNK_GET_CONTENT = function () {
  const d = window.TUNK_DEFAULT_CONTENT;
  try {
    const saved = JSON.parse(localStorage.getItem("tunk_content") || "null");
    return saved ? TUNK_DEEP_MERGE(d, saved) : d;
  } catch (e) { return d; }
};

window.TUNK_SAVE_CONTENT = function (c) { localStorage.setItem("tunk_content", JSON.stringify(c)); };
window.TUNK_CLEAR_CONTENT = function () { localStorage.removeItem("tunk_content"); };

/* -------------------------------------------------------------------------
   Theme injection — writes a <style id="tunk-theme"> tag with the
   current colors and font choices, mapped to the design-system
   CSS variables. Called on page load and whenever admin edits the theme.
   ------------------------------------------------------------------------- */
window.TUNK_APPLY_THEME = function (content) {
  const t = (content || window.TUNK_GET_CONTENT()).theme || {};
  const c = t.colors || {};
  const f = t.fonts  || {};
  const hex2rgba = (hex, a) => {
    const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex || "");
    if (!m) return "rgba(0,0,0," + a + ")";
    return `rgba(${parseInt(m[1],16)}, ${parseInt(m[2],16)}, ${parseInt(m[3],16)}, ${a})`;
  };
  const css = `:root {
    --ink: ${c.ink};
    --paper: ${c.paper};
    --bone: ${c.bone};
    --concrete: ${c.concrete};
    --aluminium: ${c.aluminium};
    --graphite: ${c.graphite};
    --carbon: ${c.carbon};
    --blue-glass: ${c.blueGlass};
    --blue-glass-tr: ${hex2rgba(c.blueGlass, 0.18)};
    --red-plexi: ${c.redPlexi};
    --red-plexi-tr: ${hex2rgba(c.redPlexi, 0.18)};
    --amber: ${c.amber};
    --amber-tr: ${hex2rgba(c.amber, 0.18)};
    --font-sans: ${f.sans};
    --font-mono: ${f.mono};
  }`;
  let tag = document.getElementById("tunk-theme");
  if (!tag) { tag = document.createElement("style"); tag.id = "tunk-theme"; document.head.appendChild(tag); }
  tag.textContent = css;
};

  <script type="text/babel" data-presets="react">
/* TUNK website — shared shell components */

const CONTENT = (window.TUNK_GET_CONTENT && window.TUNK_GET_CONTENT()) || (window.TUNK_DEFAULT_CONTENT || {});
const PROJECTS = CONTENT.projects || [];
const NAV = CONTENT.nav || [];

function Nav({ page, setPage }) {
  const h = (CONTENT.site && CONTENT.site.logoNavHeight) || 28;
  return (
    <header className="nav shell">
      <a onClick={() => setPage({ id: 'home' })} style={{cursor:'pointer',display:'block'}}>
        <img src={window.TUNK_LOGO_BLACK} alt={CONTENT.site.title} style={{height:h,display:'block'}}/>
      </a>
      <nav className="links">
        {NAV.map(l => (
          <a key={l.id}
             className={page.id === l.id || (l.id === 'work' && page.id === 'project') ? 'is-active' : ''}
             onClick={() => setPage({ id: l.id })}>
            {l.label}
          </a>
        ))}
      </nav>
      <span className="lang">{CONTENT.site.language}</span>
    </header>
  );
}

function Footer() {
  const h = (CONTENT.site && CONTENT.site.logoFooterHeight) || 70;
  const f = CONTENT.footer || {};
  return (
    <footer className="footer">
      <div className="grid">
        <div>
          <img src={window.TUNK_LOGO_WHITE} alt={CONTENT.site.title} style={{height:h,display:'block'}}/>
          <div style={{fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--aluminium)',marginTop:14,lineHeight:1.7}}>
            {f.tagline}<br/>
            {f.location}
          </div>
        </div>
        <div>
          <div className="h">{f.studioLabel}</div>
          <div className="links">
            {(f.studioLinks || []).map(l => <a key={l}>{l}</a>)}
          </div>
        </div>
        <div>
          <div className="h">{f.contactLabel}</div>
          <div className="mono">
            {CONTENT.contact.phone}<br/>
            {CONTENT.contact.email}
          </div>
        </div>
        <div>
          <div className="h">{f.followLabel}</div>
          <div className="links">
            <a>{f.instagram}</a>
          </div>
        </div>
      </div>
      <div className="legal">
        <span>{CONTENT.site.copyright}</span>
      </div>
    </footer>
  );
}

function Placeholder({ ratio = '4/3', meta = '1280 × 960', num = '№ 00', accent = null }) {
  const overlay = accent ? { backgroundColor: `var(--${accent}-tr)` } : null;
  return (
    <div className="ph" style={{aspectRatio: ratio}}>
      <span className="ph-num">{num}</span>
      <span className="ph-meta">{meta}</span>
      {accent && <div style={{position:'absolute', inset:0, ...overlay, mixBlendMode:'multiply', pointerEvents:'none'}}/>}
    </div>
  );
}

function Tile({ project, onOpen }) {
  return (
    <div className="tile" onClick={() => onOpen(project)}>
      <Placeholder
        ratio="4/3"
        meta={`${project.location.toUpperCase()} · ${project.kind.toUpperCase()}`}
        num={project.id}
        accent={project.accent}
      />
      <div className="meta">
        <div className="name">{project.name}</div>
        <div className="num">{project.year}</div>
      </div>
      <div className="sub">{project.kind} · {project.area}</div>
    </div>
  );
}

function IdxRow({ project, onOpen }) {
  return (
    <div className="idx-row" onClick={() => onOpen(project)}>
      <div className="num">{project.id}</div>
      <div><div className="name">{project.name}</div></div>
      <div className="meta">{project.kind.toUpperCase()}</div>
      <div className="meta">{project.location.toUpperCase()}</div>
      <div className="meta">{project.year}</div>
      <div className="arrow">→</div>
    </div>
  );
}

function SectionHead({ num, title, more, onMore }) {
  return (
    <div className="section-head">
      <div style={{display:'flex',gap:24,alignItems:'baseline'}}>
        <span className="num">№ {num}</span>
        <h2>{title}</h2>
      </div>
      {more && <a className="more" onClick={onMore}>{more} →</a>}
    </div>
  );
}

Object.assign(window, { CONTENT, PROJECTS, NAV, Nav, Footer, Placeholder, Tile, IdxRow, SectionHead });

</script>
  <script type="text/babel" data-presets="react">
/* TUNK website — page components */

function HomePage({ setPage }) {
  const h = CONTENT.home || {};
  return (
    <main>
      <section className="hero shell" style={{paddingLeft:0,paddingRight:0}}>
        <div className="tag tag-ink" style={{marginBottom: 32}}>{h.heroEyebrow}</div>
        <h1 className="hero-title" style={{whiteSpace:'pre-line',fontSize:124,fontWeight:900}}>{h.heroTitle}</h1>
        <div className="hero-sub">
          <p>{h.heroIntro1}</p>
          <p>{h.heroIntro2}</p>
          <div style={{display:'flex',flexDirection:'column',gap:8,fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'0.04em',textTransform:'uppercase',color:'var(--graphite)'}}>
            {(h.heroStats || []).map((s,i) => <span key={i}>{s}</span>)}
          </div>
        </div>
      </section>

      <section className="section shell">
        <SectionHead num="01" title={h.selectedWorkLabel} more={h.selectedWorkMore} onMore={() => setPage({id:'work'})} />
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'48px 32px'}}>
          {PROJECTS.slice(0,4).map(p => <Tile key={p.id} project={p} onOpen={() => setPage({id:'project', project:p})} />)}
        </div>
      </section>

      <section className="section shell">
        <SectionHead num="02" title={h.practiceLabel} />
        <div style={{display:'grid',gridTemplateColumns:'1fr 1.4fr',gap:64}}>
          <div>
            <div className="tag" style={{marginBottom:12}}>{h.practiceEyebrow}</div>
            <p style={{fontSize:18,lineHeight:1.5,letterSpacing:'-0.005em'}}>{h.practiceText}</p>
          </div>
          <div style={{borderLeft:'1px solid var(--ink)',paddingLeft:48}}>
            <div className="tag" style={{marginBottom:12}}>{h.notesEyebrow}</div>
            <div style={{display:'grid',gap:24}}>
              {(h.notes || []).map((n,i) => (
                <div key={i} style={{borderBottom:'1px solid var(--concrete)',paddingBottom:14}}>
                  <div className="tag" style={{color:'var(--graphite)'}}>{n.date} · {n.kind}</div>
                  <div style={{fontWeight:600,fontSize:16,marginTop:6}}>{n.title}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </section>
    </main>
  );
}

function WorkPage({ setPage }) {
  const w = CONTENT.work || {};
  const [view, setView] = React.useState('grid');
  const [filter, setFilter] = React.useState(w.filters && w.filters[0] || 'All');
  const filters = w.filters || ['All'];
  const filtered = filter === filters[0] ? PROJECTS : PROJECTS.filter(p => p.tags.includes(filter));
  return (
    <main className="shell" style={{paddingTop:48, paddingBottom:48}}>
      <div className="tag tag-ink" style={{marginBottom:24}}>{w.eyebrow}</div>
      <h1 style={{fontWeight:900,fontSize:'clamp(56px,7vw,112px)',letterSpacing:'-0.04em',lineHeight:0.92,textTransform:'uppercase'}}>{w.title}</h1>

      <div className="filter" style={{marginTop:64}}>
        <span className="label">{w.filterLabel}</span>
        {filters.map(f => (
          <span key={f} className={`chip ${filter === f ? 'is-active' : ''}`} onClick={() => setFilter(f)}>{f}</span>
        ))}
        <span style={{marginLeft:'auto',display:'flex',gap:4}}>
          <span className={`chip ${view==='grid'?'is-active':''}`}  onClick={()=>setView('grid')}>{w.gridLabel}</span>
          <span className={`chip ${view==='index'?'is-active':''}`} onClick={()=>setView('index')}>{w.indexLabel}</span>
        </span>
      </div>

      <div className="tag" style={{marginTop:8,marginBottom:24}}>
        {filtered.length.toString().padStart(2,'0')} {w.countNoun} · {w.rangeNote}
      </div>

      {view === 'grid' ? (
        <div style={{display:'grid',gridTemplateColumns:'repeat(3, 1fr)',gap:'48px 24px'}}>
          {filtered.map(p => <Tile key={p.id} project={p} onOpen={() => setPage({id:'project', project:p})} />)}
        </div>
      ) : (
        <div>
          <div className="idx-row" style={{borderTop:'1px solid var(--ink)',cursor:'default',padding:'12px 0'}}>
            <div className="num">№</div><div className="num">PROJECT</div><div className="num">KIND</div><div className="num">LOCATION</div><div className="num">YEAR</div><div></div>
          </div>
          {filtered.map(p => <IdxRow key={p.id} project={p} onOpen={() => setPage({id:'project', project:p})} />)}
        </div>
      )}
    </main>
  );
}

function ProjectPage({ project, setPage }) {
  if (!project) project = PROJECTS[0];
  if (!project) return null;
  const pp = CONTENT.projectPage || {};
  const accentBar = project.accent ? `var(--${project.accent})` : 'var(--ink)';
  return (
    <main>
      <section className="shell" style={{paddingTop:32, paddingBottom:24}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid var(--ink)',paddingBottom:12}}>
          <div className="tag tag-ink">{project.id} · {project.year}</div>
          <a className="tag" style={{cursor:'pointer'}} onClick={()=>setPage({id:'work'})}>{pp.backLabel}</a>
        </div>
      </section>
      <section className="shell">
        <Placeholder ratio="16/9" meta={`${project.location.toUpperCase()} · ${project.kind.toUpperCase()}`} num={project.id} accent={project.accent} />
      </section>
      <section className="shell" style={{paddingTop:48}}>
        <h1 style={{fontWeight:900,fontSize:'clamp(48px,6.5vw,104px)',letterSpacing:'-0.04em',lineHeight:0.95,textTransform:'uppercase'}}>{project.name}</h1>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:64,marginTop:48,paddingTop:24,borderTop:`1px solid ${accentBar}`}}>
          <div><p style={{fontSize:18,lineHeight:1.55,maxWidth:620}}>{project.summary}</p></div>
          <div style={{display:'grid',gap:14,fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'0.04em',textTransform:'uppercase',color:'var(--graphite)',lineHeight:1.6}}>
            <div><div style={{color:'var(--ink)'}}>{pp.typeLabel}</div>{project.kind}</div>
            <div><div style={{color:'var(--ink)'}}>{pp.yearLabel}</div>{project.year}</div>
            <div><div style={{color:'var(--ink)'}}>{pp.locationLabel}</div>{project.location}</div>
            <div><div style={{color:'var(--ink)'}}>{pp.areaLabel}</div>{project.area}</div>
            <div><div style={{color:'var(--ink)'}}>{pp.materialsLabel}</div>{(project.materials || []).join(' · ')}</div>
            <div><div style={{color:'var(--ink)'}}>{pp.photoLabel}</div>{pp.photographer}</div>
          </div>
        </div>
      </section>
      <section className="shell" style={{paddingTop:64,display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
        <Placeholder ratio="3/4" meta={pp.detailLabel} num={`${project.id} / 02`} accent={project.accent}/>
        <Placeholder ratio="3/4" meta={pp.detailLabel} num={`${project.id} / 03`} accent={project.accent}/>
      </section>
      <section className="shell" style={{paddingTop:24}}>
        <Placeholder ratio="21/9" meta={pp.longShotLabel} num={`${project.id} / 04`} accent={project.accent}/>
      </section>
      <section className="shell" style={{paddingTop:64,paddingBottom:48,display:'flex',justifyContent:'space-between',borderTop:'1px solid var(--ink)',marginTop:64}}>
        <a className="tag tag-ink" style={{cursor:'pointer'}} onClick={()=>{
          const idx = PROJECTS.findIndex(p=>p.id===project.id);
          const prev = PROJECTS[(idx-1+PROJECTS.length)%PROJECTS.length];
          setPage({id:'project', project:prev});
        }}>{pp.prevLabel}</a>
        <a className="tag tag-ink" style={{cursor:'pointer'}} onClick={()=>{
          const idx = PROJECTS.findIndex(p=>p.id===project.id);
          const next = PROJECTS[(idx+1)%PROJECTS.length];
          setPage({id:'project', project:next});
        }}>{pp.nextLabel}</a>
      </section>
    </main>
  );
}

function AboutPage() {
  const a = CONTENT.about || {};
  return (
    <main className="shell" style={{paddingTop:48, paddingBottom:64}}>
      <div className="tag tag-ink" style={{marginBottom:24}}>{a.eyebrow}</div>
      <h1 style={{fontWeight:900,fontSize:'clamp(56px,7vw,112px)',letterSpacing:'-0.04em',lineHeight:0.92,textTransform:'uppercase',maxWidth:1200}}>{a.heading}</h1>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1.6fr',gap:96,marginTop:96,borderTop:'1px solid var(--ink)',paddingTop:32}}>
        <div className="tag tag-ink">{a.practiceLabel}</div>
        <div>
          <p style={{fontSize:18,lineHeight:1.55,marginBottom:18}}>{a.p1}</p>
          <p style={{fontSize:14,lineHeight:1.7,color:'var(--graphite)'}}>{a.p2}</p>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1.6fr',gap:96,marginTop:64,borderTop:'1px solid var(--concrete)',paddingTop:32}}>
        <div className="tag tag-ink">{a.peopleLabel}</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:32}}>
          {(a.team || []).map(p => (
            <div key={p.name} style={{borderTop:'1px solid var(--concrete)',paddingTop:10}}>
              <div style={{fontWeight:700,fontSize:15}}>{p.name}</div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:10,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--graphite)',marginTop:4}}>{p.role}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1.6fr',gap:96,marginTop:64,borderTop:'1px solid var(--concrete)',paddingTop:32}}>
        <div className="tag tag-ink">{a.clientsLabel}</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px 32px',fontFamily:'var(--font-mono)',fontSize:12,letterSpacing:'0.04em',textTransform:'uppercase',lineHeight:1.7}}>
          {(a.clients || []).map(c => <span key={c}>{c}</span>)}
        </div>
      </div>
    </main>
  );
}

function PressPage() {
  const p = CONTENT.press || {};
  return (
    <main className="shell" style={{paddingTop:48, paddingBottom:64}}>
      <div className="tag tag-ink" style={{marginBottom:24}}>{p.eyebrow}</div>
      <h1 style={{fontWeight:900,fontSize:'clamp(56px,7vw,112px)',letterSpacing:'-0.04em',lineHeight:0.92,textTransform:'uppercase'}}>{p.title}</h1>
      <p style={{maxWidth:560,fontSize:15,lineHeight:1.55,marginTop:48}}>{p.intro}</p>
      <div style={{marginTop:64,borderTop:'1px solid var(--ink)'}}>
        {(p.items || []).map(r => (
          <div key={r.n} style={{display:'grid',gridTemplateColumns:'80px 1fr 200px 120px 120px',gap:20,padding:'18px 0',alignItems:'center',borderBottom:'1px solid var(--concrete)',cursor:'pointer'}}>
            <div className="tag" style={{color:'var(--graphite)'}}>№ {r.n}</div>
            <div><div style={{fontWeight:700,fontSize:16}}>{r.name}</div></div>
            <div className="tag" style={{color:'var(--graphite)'}}>{r.meta}</div>
            <div className="tag" style={{color:'var(--graphite)'}}>{r.langs}</div>
            <div style={{fontFamily:'var(--font-sans)',fontWeight:500,fontSize:11,letterSpacing:'0.12em',textTransform:'uppercase',justifySelf:'end'}}>{p.downloadLabel} <span style={{fontFamily:'var(--font-mono)'}}>→</span></div>
          </div>
        ))}
      </div>
    </main>
  );
}

function ContactPage() {
  const c = CONTENT.contact || {};
  const f = c.form || {};
  const fields = [
    [f.nameLabel,    f.namePlaceholder],
    [f.emailLabel,   f.emailPlaceholder],
    [f.subjectLabel, f.subjectPlaceholder],
    [f.budgetLabel,  f.budgetPlaceholder],
  ];
  return (
    <main className="shell" style={{paddingTop:48, paddingBottom:64}}>
      <div className="tag tag-ink" style={{marginBottom:24}}>{c.eyebrow}</div>
      <h1 style={{fontWeight:900,fontSize:'clamp(56px,7vw,112px)',letterSpacing:'-0.04em',lineHeight:0.92,textTransform:'uppercase'}}>{c.title}</h1>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1.4fr',gap:96,marginTop:96,borderTop:'1px solid var(--ink)',paddingTop:32}}>
        <div>
          <div className="tag tag-ink" style={{marginBottom:18}}>{c.studioLabel}</div>
          <div style={{fontFamily:'var(--font-mono)',fontSize:13,lineHeight:1.7,letterSpacing:'0.02em',textTransform:'uppercase',whiteSpace:'pre-line'}}>
            {c.address}
            <br/><br/>
            {c.phone}<br/>{c.email}<br/>{c.pressEmail}
          </div>
        </div>
        <div>
          <div className="tag tag-ink" style={{marginBottom:18}}>{c.enquireLabel}</div>
          <form onSubmit={(e)=>{e.preventDefault();alert('Submitted (demo).');}} style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'32px 40px'}}>
            {fields.map(([l,v])=>(
              <div key={l} style={{display:'grid',gap:6}}>
                <label style={{fontFamily:'var(--font-sans)',fontWeight:500,fontSize:10,letterSpacing:'0.12em',textTransform:'uppercase'}}>{l}</label>
                <input defaultValue={v} style={{font:'inherit',fontSize:14,background:'transparent',border:0,borderBottom:'1px solid var(--ink)',padding:'8px 0',outline:'none',borderRadius:0}}/>
              </div>
            ))}
            <div style={{gridColumn:'1 / -1',display:'grid',gap:6}}>
              <label style={{fontFamily:'var(--font-sans)',fontWeight:500,fontSize:10,letterSpacing:'0.12em',textTransform:'uppercase'}}>{f.messageLabel}</label>
              <textarea rows="4" defaultValue={f.messagePlaceholder} style={{font:'inherit',fontSize:14,background:'transparent',border:0,borderBottom:'1px solid var(--ink)',padding:'8px 0',outline:'none',borderRadius:0,resize:'vertical'}}/>
            </div>
            <button type="submit" className="btn primary" style={{justifySelf:'start'}}>{f.submitLabel} →</button>
          </form>
        </div>
      </div>
    </main>
  );
}

Object.assign(window, { HomePage, WorkPage, ProjectPage, AboutPage, PressPage, ContactPage });

</script>
  <script type="text/babel" data-presets="react">
/* TUNK website — app root */

function App() {
  const [page, setPage] = React.useState({ id: 'home' });
  React.useEffect(() => { window.scrollTo(0,0); }, [page]);
  return (
    <div className="page" data-screen-label={`TUNK Site · ${page.id}`}>
      <Nav page={page} setPage={setPage} />
      {page.id === 'home'    && <HomePage    setPage={setPage} />}
      {page.id === 'work'    && <WorkPage    setPage={setPage} />}
      {page.id === 'project' && <ProjectPage project={page.project} setPage={setPage} />}
      {page.id === 'about'   && <AboutPage />}
      {page.id === 'press'   && <PressPage />}
      {page.id === 'contact' && <ContactPage />}
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
