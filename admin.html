/* -------------------------------------------------------------------------
   Deep-merge helper — local edits override defaults at any depth.
   ------------------------------------------------------------------------- */
function TUNK_DEEP_MERGE(base, override) {
  if (override === undefined || override === null) return base;
  if (Array.isArray(base) || Array.isArray(override)) return override;
  if (typeof base !== "object" || typeof override !== "object") return override;
  const out = {};
  const keys = new Set([...Object.keys(base || {}), ...Object.keys(override || {})]);
  keys.forEach(k => { out[k] = TUNK_DEEP_MERGE(base ? base[k] : undefined, override[k]); });
  return out;
}

window.TUNK_GET_CONTENT = function () {
  const d = window.TUNK_DEFAULT_CONTENT;
  try {
    const saved = JSON.parse(localStorage.getItem("tunk_content") || "null");
    return saved ? TUNK_DEEP_MERGE(d, saved) : d;
  } catch (e) { return d; }
};

window.TUNK_SAVE_CONTENT = function (c) { localStorage.setItem("tunk_content", JSON.stringify(c)); };
window.TUNK_CLEAR_CONTENT = function () { localStorage.removeItem("tunk_content"); };

/* -------------------------------------------------------------------------
   Theme injection — writes a <style id="tunk-theme"> tag with the
   current colors and font choices, mapped to the design-system
   CSS variables. Called on page load and whenever admin edits the theme.
   ------------------------------------------------------------------------- */
window.TUNK_APPLY_THEME = function (content) {
  const t = (content || window.TUNK_GET_CONTENT()).theme || {};
  const c = t.colors || {};
  const f = t.fonts  || {};
  const hex2rgba = (hex, a) => {
    const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex || "");
    if (!m) return "rgba(0,0,0," + a + ")";
    return `rgba(${parseInt(m[1],16)}, ${parseInt(m[2],16)}, ${parseInt(m[3],16)}, ${a})`;
  };
  const css = `:root {
    --ink: ${c.ink};
    --paper: ${c.paper};
    --bone: ${c.bone};
    --concrete: ${c.concrete};
    --aluminium: ${c.aluminium};
    --graphite: ${c.graphite};
    --carbon: ${c.carbon};
    --blue-glass: ${c.blueGlass};
    --blue-glass-tr: ${hex2rgba(c.blueGlass, 0.18)};
    --red-plexi: ${c.redPlexi};
    --red-plexi-tr: ${hex2rgba(c.redPlexi, 0.18)};
    --amber: ${c.amber};
    --amber-tr: ${hex2rgba(c.amber, 0.18)};
    --font-sans: ${f.sans};
    --font-mono: ${f.mono};
  }`;
  let tag = document.getElementById("tunk-theme");
  if (!tag) { tag = document.createElement("style"); tag.id = "tunk-theme"; document.head.appendChild(tag); }
  tag.textContent = css;
};

<style>
:root {
  --ink: #0A0A0A;
  --paper: #FFFFFF;
  --bone: #F4F3EF;
  --concrete: #E8E7E2;
  --aluminium: #B8B8B5;
  --graphite: #5A5A57;
  --carbon: #1C1C1B;
  --red-plexi: #D4271E;
  --blue-glass: #1C3FBF;
  --amber: #C97A1A;
  --font-sans: 'Gotham', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  --ease: cubic-bezier(0.2, 0, 0, 1);

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bone); color: var(--ink); font-family: var(--font-sans); font-size: 13px; line-height: 1.55; -webkit-font-smoothing: antialiased; }

  background: var(--ink); color: var(--paper);
  padding: 14px 24px; gap: 24px;
  position: sticky; top: 0; z-index: 10;
}
.bar .brand { display: flex; align-items: center; gap: 14px; }
.bar .brand .word { font-weight: 900; font-size: 22px; letter-spacing: -0.04em; }
.bar .brand .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--aluminium); padding-left: 14px; border-left: 1px solid var(--graphite); }
.bar .status { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--aluminium); }
.bar .status .dot { display: inline-block; width: 6px; height: 6px; background: #5BC76C; margin-right: 8px; vertical-align: middle; }
.bar .actions { display: flex; gap: 8px; }

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 16px;
  border: 1px solid var(--paper);
  background: transparent;
  color: var(--paper);
  font-family: var(--font-sans);
  font-weight: 500; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  transition: all 150ms var(--ease);
}
.btn:hover { background: var(--paper); color: var(--ink); }
.btn.primary { background: var(--paper); color: var(--ink); }
.btn.primary:hover { opacity: 0.85; }
.btn.dark { border-color: var(--ink); color: var(--ink); }
.btn.dark:hover { background: var(--ink); color: var(--paper); }
.btn.dark.primary { background: var(--ink); color: var(--paper); }
.btn.dark.primary:hover { opacity: 0.85; }
.btn.danger { border-color: var(--red-plexi); color: var(--red-plexi); }

.main { display: grid; grid-template-columns: 280px 1fr; min-height: 0; }

.side { background: var(--paper); border-right: 1px solid var(--concrete); padding: 24px 0 64px; overflow-y: auto; max-height: calc(100vh - 70px); position: sticky; top: 70px; }

.side .item {
  display: flex; justify-content: space-between; align-items: center;

  font-family: var(--font-sans);
  font-weight: 500; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
  border-left: 2px solid transparent;
  transition: all 150ms var(--ease);
}
.side .item:hover { background: var(--bone); }
.side .item.active { border-left-color: var(--ink); background: var(--bone); }
.side .item .count { font-family: var(--font-mono); font-size: 10px; color: var(--graphite); }

.content { padding: 32px 48px 96px; max-width: 1080px; }
.content h1 { font-family: var(--font-sans); font-weight: 900; font-size: 36px; letter-spacing: -0.02em; text-transform: uppercase; margin-bottom: 4px; }

/* form */
.field { display: grid; gap: 6px; margin-bottom: 18px; }

<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
/* TUNK admin — shared form primitives */

function cloneDeep(x) { return JSON.parse(JSON.stringify(x)); }

function isModified(content, defaults) { return JSON.stringify(content) !== JSON.stringify(defaults); }

function download(filename, text, mime = 'text/plain') {
  const blob = new Blob([text], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
}

function generateContentJs(content) {
  const json = JSON.stringify(content, null, 2);
  return `/* =========================================================================
   TUNK STUDIO — content.js
   Generated by admin.html on ${new Date().toISOString()}.
   ========================================================================= */

window.TUNK_DEFAULT_CONTENT = ${json};

function TUNK_DEEP_MERGE(base, override) {
  if (override === undefined || override === null) return base;
  if (Array.isArray(base) || Array.isArray(override)) return override;
  if (typeof base !== "object" || typeof override !== "object") return override;
  const out = {};
  const keys = new Set([...Object.keys(base || {}), ...Object.keys(override || {})]);
  keys.forEach(k => { out[k] = TUNK_DEEP_MERGE(base ? base[k] : undefined, override[k]); });
  return out;
}

window.TUNK_GET_CONTENT = function () {
  const d = window.TUNK_DEFAULT_CONTENT;
  try {
    const saved = JSON.parse(localStorage.getItem("tunk_content") || "null");
    return saved ? TUNK_DEEP_MERGE(d, saved) : d;
  } catch (e) { return d; }
};
window.TUNK_SAVE_CONTENT = function (c) { localStorage.setItem("tunk_content", JSON.stringify(c)); };
window.TUNK_CLEAR_CONTENT = function () { localStorage.removeItem("tunk_content"); };

window.TUNK_APPLY_THEME = function (content) {
  const t = (content || window.TUNK_GET_CONTENT()).theme || {};
  const c = t.colors || {}; const f = t.fonts || {};
  const hex2rgba = (hex, a) => {
    const m = /^#?([a-f\\d]{2})([a-f\\d]{2})([a-f\\d]{2})$/i.exec(hex || "");
    if (!m) return "rgba(0,0,0," + a + ")";
    return \`rgba(\${parseInt(m[1],16)}, \${parseInt(m[2],16)}, \${parseInt(m[3],16)}, \${a})\`;
  };
  const css = \`:root {
    --ink: \${c.ink};
    --paper: \${c.paper};
    --bone: \${c.bone};
    --concrete: \${c.concrete};
    --aluminium: \${c.aluminium};
    --graphite: \${c.graphite};
    --carbon: \${c.carbon};
    --blue-glass: \${c.blueGlass};
    --blue-glass-tr: \${hex2rgba(c.blueGlass, 0.18)};
    --red-plexi: \${c.redPlexi};
    --red-plexi-tr: \${hex2rgba(c.redPlexi, 0.18)};
    --amber: \${c.amber};
    --amber-tr: \${hex2rgba(c.amber, 0.18)};
    --font-sans: \${f.sans};
    --font-mono: \${f.mono};
  }\`;
  let tag = document.getElementById("tunk-theme");
  if (!tag) { tag = document.createElement("style"); tag.id = "tunk-theme"; document.head.appendChild(tag); }
  tag.textContent = css;
};
`;
}

/* Field — label + hint wrapper */
function Field({ label, hint, children, span = 1 }) {
  return (
    <div className="field" style={span > 1 ? { gridColumn: `span ${span}` } : {}}>
      <label>{label}</label>
      {children}
      {hint && <div className="hint">{hint}</div>}
    </div>
  );
}

/* TextIn — text input */
function TextIn({ value, onChange, placeholder, type = 'text' }) {
  return <input type={type} value={value ?? ''} placeholder={placeholder}
                onChange={e => onChange(type === 'number' ? (parseFloat(e.target.value) || 0) : e.target.value)} />;
}

/* TextArea */
function TextArea({ value, onChange, rows = 3, placeholder }) {
  return <textarea rows={rows} value={value ?? ''} placeholder={placeholder}
                   onChange={e => onChange(e.target.value)} />;
}

/* ColorIn — hex + swatch */
function ColorIn({ value, onChange }) {
  return (
    <div className="color-in">
      <input type="color" value={value || '#000000'} onChange={e => onChange(e.target.value)} />
      <input type="text" value={value || ''} onChange={e => onChange(e.target.value)} placeholder="#000000" />
      <span className="sw-preview" style={{background: value}} />
    </div>
  );
}

/* ChipInput — comma-separated tags */
function ChipInput({ value, onChange, placeholder = 'Add and press Enter' }) {
  const [draft, setDraft] = React.useState('');
  function add(v) {
    const t = (v || draft).trim(); if (!t) return;
    if ((value || []).includes(t)) { setDraft(''); return; }
    onChange([...(value || []), t]); setDraft('');
  }
  return (
    <div className="chip-input">
      {(value || []).map((tag, i) => (
        <span key={i} className="chip-tag">
          {tag}
          <span className="x" onClick={() => onChange(value.filter((_, j) => j !== i))}>×</span>
        </span>
      ))}
      <input value={draft} placeholder={placeholder}
             onChange={e => setDraft(e.target.value)}
             onKeyDown={e => { if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); add(); } }}
             onBlur={() => add()} />
    </div>
  );
}

/* List editor — generic add/remove/reorder rows for an array of objects */
function ListEditor({ items, onChange, columns, addLabel = '+ Add row', emptyLabel = 'No items yet.' }) {
  function set(i, k, v) { const next = [...items]; next[i] = { ...next[i], [k]: v }; onChange(next); }
  function remove(i) { onChange(items.filter((_, j) => j !== i)); }
  function move(i, d) {
    const j = i + d; if (j < 0 || j >= items.length) return;
    const next = [...items]; [next[i], next[j]] = [next[j], next[i]]; onChange(next);
  }
  function add() {
    const blank = {}; columns.forEach(c => blank[c.key] = c.default || '');
    onChange([...(items || []), blank]);
  }
  const gridCols = columns.map(c => c.width || '1fr').join(' ') + ' 120px';
  return (
    <div>
      <div className="table" style={{marginBottom:12}}>
        <div className="table-row head" style={{gridTemplateColumns: gridCols}}>
          {columns.map(c => <span key={c.key}>{c.label}</span>)}
          <span style={{textAlign:'right'}}>Actions</span>
        </div>
        {(items || []).length === 0 && <div style={{padding:'24px 16px',color:'var(--graphite)',fontStyle:'italic',textAlign:'center'}}>{emptyLabel}</div>}
        {(items || []).map((row, i) => (
          <div key={i} className="table-row" style={{gridTemplateColumns: gridCols, padding:'10px 16px'}}>
            {columns.map(c => (
              c.type === 'textarea'
                ? <textarea key={c.key} rows="2" value={row[c.key] ?? ''} onChange={e => set(i, c.key, e.target.value)} placeholder={c.placeholder} />
                : <input key={c.key} type={c.type || 'text'} value={row[c.key] ?? ''} onChange={e => set(i, c.key, e.target.value)} placeholder={c.placeholder} />
            ))}
            <div className="actions">
              <button className="btn dark sm" onClick={() => move(i, -1)} disabled={i===0} style={i===0?{opacity:0.3}:{}}>↑</button>
              <button className="btn dark sm" onClick={() => move(i, 1)}  disabled={i===items.length-1} style={i===items.length-1?{opacity:0.3}:{}}>↓</button>
              <button className="btn dark danger sm" onClick={() => remove(i)}>×</button>
            </div>
          </div>
        ))}
      </div>
      <button className="btn dark sm" onClick={add}>{addLabel}</button>
    </div>
  );
}

Object.assign(window, { cloneDeep, isModified, download, generateContentJs, Field, TextIn, TextArea, ColorIn, ChipInput, ListEditor });

</script>
  <script type="text/babel" data-presets="react">
/* TUNK admin — Projects tab */

const ACCENTS = [
  { value: null,          label: 'None',        color: 'transparent', border: 'var(--concrete)' },
  { value: 'red-plexi',   label: 'Red plexi',   color: 'var(--red-plexi)' },
  { value: 'blue-glass',  label: 'Blue glass',  color: 'var(--blue-glass)' },
  { value: 'amber',       label: 'Amber',       color: 'var(--amber)' },
];

const KIND_OPTIONS = ['Retail Interior', 'Exhibition', 'Residential', 'Adaptive Reuse', 'Installation', 'Cultural', 'Public', 'Other'];

function ProjectForm({ project, suggestedTags, onChange, onDelete, onClose, isNew }) {
  const set = (k, v) => onChange({ ...project, [k]: v });
  return (
    <div className="panel">
      <div className="head">
        <h3>{isNew ? 'New project' : `Edit · ${project.name || 'Untitled'}`}</h3>
        <div className="row-actions">
          {!isNew && <button className="btn dark danger sm" onClick={onDelete}>Delete</button>}
          <button className="btn dark sm" onClick={onClose}>Close</button>
        </div>
      </div>

      <div className="row">
        <Field label="Project ID" hint="Lab-tag identifier. Format PRJ-### recommended.">
          <TextIn value={project.id} onChange={v => set('id', v)} placeholder="PRJ-024" />
        </Field>
        <Field label="Year">
          <TextIn type="number" value={project.year} onChange={v => set('year', v)} />
        </Field>
      </div>

      <Field label="Project name">
        <TextIn value={project.name} onChange={v => set('name', v)} placeholder="Karaköy Cosmetics" />
      </Field>

      <div className="row3">
        <Field label="Kind">
          <select value={project.kind} onChange={e => set('kind', e.target.value)}>
            {KIND_OPTIONS.map(k => <option key={k} value={k}>{k}</option>)}
          </select>
        </Field>
        <Field label="Location"><TextIn value={project.location} onChange={v => set('location', v)} /></Field>
        <Field label="Area"><TextIn value={project.area} onChange={v => set('area', v)} placeholder="84 m²" /></Field>
      </div>

      <Field label="Summary" hint="Lead with what the thing is (materials, room counts), not what it means.">
        <TextArea rows={4} value={project.summary} onChange={v => set('summary', v)} />
      </Field>

      <Field label="Materials" hint="e.g. red plexiglass, brushed steel, oak. Most projects use 3 – 5.">
        <ChipInput value={project.materials} onChange={v => set('materials', v)} placeholder="Add material and press Enter" />
      </Field>

      <Field label="Tags" hint={`Used for filters on the Work page. Suggestions: ${(suggestedTags||[]).join(', ')}.`}>
        <ChipInput value={project.tags} onChange={v => set('tags', v)} placeholder="Add tag" />
      </Field>

      <Field label="Material accent" hint="Set only when a real material in the project justifies it.">
        <div className="swatches">
          {ACCENTS.map(a => (
            <div key={a.value || 'none'}
                 className={`swatch ${project.accent === a.value ? 'is-active' : ''}`}
                 onClick={() => set('accent', a.value)}>
              <span className="sw" style={{background: a.color, border: a.border ? `1px solid ${a.border}` : ''}} />
              {a.label}
            </div>
          ))}
        </div>
      </Field>

      <div className="row">
        <Field label="URL slug" hint="Lowercase, hyphens only.">
          <TextIn value={project.slug} onChange={v => set('slug', v.toLowerCase().replace(/[^a-z0-9-]/g,'-'))} />
        </Field>
        <Field label="Photo count">
          <TextIn type="number" value={project.photos} onChange={v => set('photos', v)} />
        </Field>
      </div>
    </div>
  );
}

function ProjectsPage({ content, setContent }) {
  const [editing, setEditing] = React.useState(null);
  const projects = content.projects || [];

  function updateProject(idx, p) {
    const next = [...projects]; next[idx] = p;
    setContent({ ...content, projects: next });
  }
  function addProject() {
    const np = {
      id: `PRJ-${String(Math.floor(Math.random()*900)+100)}`,
      slug: '', name: '', kind: 'Retail Interior',
      year: new Date().getFullYear(), location: 'Istanbul', area: '',
      materials: [], accent: null, summary: '', photos: 0, tags: [],
    };
    setContent({ ...content, projects: [...projects, np] });
    setEditing(projects.length);
  }
  function deleteProject(idx) {
    if (!confirm('Delete this project? Cannot be undone (until you publish a new version).')) return;
    setContent({ ...content, projects: projects.filter((_, i) => i !== idx) });
    setEditing(null);
  }
  function move(idx, dir) {
    const j = idx + dir; if (j < 0 || j >= projects.length) return;
    const next = [...projects]; [next[idx], next[j]] = [next[j], next[idx]];
    setContent({ ...content, projects: next });
    if (editing === idx) setEditing(j); else if (editing === j) setEditing(idx);
  }

  return (
    <div>
      <h1>Projects</h1>
      <div className="sub">№ 01 · {projects.length.toString().padStart(2,'0')} projects</div>

      {editing === null && (
        <>
          <div className="spread mt-4" style={{marginBottom:16}}>
            <div style={{fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--graphite)'}}>
              Order here = order on the Work page.
            </div>
            <button className="btn dark primary sm" onClick={addProject}>+ New project</button>
          </div>

          {projects.length === 0 ? (
            <div className="empty">
              <div className="ttl">No projects yet</div>
              <div>Click <b>+ New project</b> to add your first one.</div>
            </div>
          ) : (
            <div className="table">
              <div className="table-row head">
                <span>№</span><span>Project</span><span>Kind</span><span>Year</span><span>Location</span>
                <span style={{textAlign:'right'}}>Actions</span>
              </div>
              {projects.map((p, i) => (
                <div key={i} className="table-row">
                  <span className="id">{p.id}</span>
                  <div>
                    <div className="name">{p.name || <span style={{color:'var(--graphite)',fontStyle:'italic',fontWeight:400}}>(untitled)</span>}</div>
                  </div>
                  <span className="meta">{p.kind}</span>
                  <span className="meta">{p.year}</span>
                  <span className="meta">{p.location}</span>
                  <div className="actions">
                    <button className="btn dark sm" onClick={() => move(i, -1)} disabled={i===0} style={i===0?{opacity:0.3}:{}}>↑</button>
                    <button className="btn dark sm" onClick={() => move(i, 1)}  disabled={i===projects.length-1} style={i===projects.length-1?{opacity:0.3}:{}}>↓</button>
                    <button className="btn dark primary sm" onClick={() => setEditing(i)}>Edit →</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </>
      )}

      {editing !== null && projects[editing] && (
        <ProjectForm
          project={projects[editing]}
          suggestedTags={content.work && content.work.filters && content.work.filters.slice(1) || []}
          onChange={p => updateProject(editing, p)}
          onDelete={() => deleteProject(editing)}
          onClose={() => setEditing(null)}
        />
      )}
    </div>
  );
}

Object.assign(window, { ProjectsPage });

</script>
  <script type="text/babel" data-presets="react">

function DetailsPage({ content, setContent }) {
  const set = (k, v) => setContent({ ...content, projectPage: { ...content.projectPage, [k]: v } });
  const p = content.projectPage || {};
  return (
    <div>
      <h1>Project detail page</h1>

  <script type="text/babel" data-presets="react">
/* TUNK admin — Publish + Help tabs */

function PublishPage({ content, defaults, onReset, onImport }) {
  const fileInput = React.useRef(null);
  const modified = isModified(content, defaults);

  function publish() { download('content.js', generateContentJs(content), 'text/javascript'); }
  function exportJson() {
    download('tunk-content-' + new Date().toISOString().slice(0,10) + '.json',
             JSON.stringify(content, null, 2), 'application/json');
  }
  function importJson(file) {
    const r = new FileReader();
    r.onload = () => {
      try {
        const parsed = JSON.parse(r.result);
        if (!parsed.projects) throw new Error('Missing required keys');
        onImport(parsed);
        alert('Imported successfully.');
      } catch (e) { alert('Could not import: ' + e.message); }
    };
    r.readAsText(file);
  }

  return (
    <div>
      <h1>Publish</h1>
      <div className="sub">№ 99 · Download, backup, restore</div>

      <div className="pub-block">
        <h3>1 · Preview your changes</h3>
        <p className="desc">Open the live site in a new tab. Edits are saved in this browser only — anyone visiting the deployed site still sees the previously-published version.</p>
        <div className="actions">
          <a href="index.html" target="_blank" className="btn dark primary sm">Open preview →</a>
        </div>
      </div>

      <div className="pub-block">
        <h3>2 · Publish to your site {modified && <span className="modified-pill">Unpublished changes</span>}</h3>
        <p className="desc">Download a fresh <kbd>content.js</kbd> with your current edits baked in. Upload it next to <kbd>index.html</kbd> on your host (Netlify drag-drop, GitHub, etc.) — replace the existing <kbd>content.js</kbd>. That's it. Visitors will see your edits on next page load.</p>
        <div className="actions">
          <button className="btn dark primary sm" onClick={publish}>Download content.js →</button>
        </div>
      </div>

      <div className="pub-block">
        <h3>3 · Backup &amp; restore</h3>
        <p className="desc">Export a JSON copy for safekeeping (recommended before big changes). Import to restore, or to move edits between devices.</p>
        <div className="actions">
          <button className="btn dark sm" onClick={exportJson}>Export JSON</button>
          <button className="btn dark sm" onClick={() => fileInput.current.click()}>Import JSON</button>
          <input ref={fileInput} type="file" accept="application/json" style={{display:'none'}}
                 onChange={e => { if (e.target.files[0]) importJson(e.target.files[0]); e.target.value = ''; }} />
        </div>
      </div>

      <div className="pub-block">
        <h3>4 · Reset</h3>
        <p className="desc">Discard all edits in this browser and revert to whatever's in content.js (the published version).</p>
        <div className="actions">
          <button className="btn dark danger sm" onClick={() => { if (confirm('Discard all unpublished edits? This cannot be undone.')) onReset(); }}>Reset to published</button>
        </div>
      </div>
    </div>
  );
}

  return (

      <div className="steps">
        <div className="step"><div className="num">1</div><div className="body">
          <b>Make changes.</b> Every tab in the sidebar controls a different part of the site. Edits auto-save as you type — the green dot in the top bar confirms it.

        <div className="step"><div className="num">2</div><div className="body">

  <script type="text/babel" data-presets="react">
function App() {
  const defaults = window.TUNK_DEFAULT_CONTENT;
  const [content, setContentRaw] = React.useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('tunk_content') || 'null');
      return saved ? window.TUNK_GET_CONTENT() : cloneDeep(defaults);
    } catch (e) { return cloneDeep(defaults); }
  });
  const [tab, setTab] = React.useState('projects');
  const modified = isModified(content, defaults);

  function setContent(next) { setContentRaw(typeof next === 'function' ? next(content) : next); }
  function resetAll() { localStorage.removeItem('tunk_content'); setContentRaw(cloneDeep(defaults)); }
  function applyTheme(c) { if (window.TUNK_APPLY_THEME) window.TUNK_APPLY_THEME(c); }

  React.useEffect(() => { localStorage.setItem('tunk_content', JSON.stringify(content)); }, [content]);

  const groups = [
    { label: 'Content', items: [
      { id: 'projects', name: 'Projects', count: (content.projects||[]).length.toString().padStart(2,'0') },
      { id: 'home',     name: 'Home',     count: '→' },
      { id: 'work',     name: 'Work',     count: '→' },
      { id: 'about',    name: 'About',    count: '→' },
      { id: 'press',    name: 'Press',    count: '→' },
      { id: 'contact',  name: 'Contact',  count: '→' },
    ]},
    { label: 'Settings', items: [
      { id: 'site',    name: 'Site & SEO',     count: '⚙' },
      { id: 'nav',     name: 'Navigation',     count: '⚙' },
      { id: 'theme',   name: 'Theme',          count: '⚙' },
      { id: 'footer',  name: 'Footer',         count: '⚙' },
      { id: 'details', name: 'Project detail', count: '⚙' },
    ]},
    { label: 'Manage', items: [
      { id: 'publish', name: 'Publish', count: modified ? '●' : '○' },
      { id: 'help',    name: 'Help',    count: '?' },
    ]},
  ];

  return (
    <div className="app">
      <div className="bar">
        <div className="brand">
          <span className="word">TUNK</span>
          <span className="tag">Admin</span>
        </div>
        <div className="status">
          <span className="dot"/>{modified ? 'Auto-saved · unpublished changes' : 'Auto-saved · in sync with published'}
        </div>
        <div className="actions">
          <a href="index.html" target="_blank" className="btn">Preview site →</a>
          <button className="btn primary" onClick={() => setTab('publish')}>Publish</button>
        </div>
      </div>

      <div className="main">
        <aside className="side">
          {groups.map(g => (
            <React.Fragment key={g.label}>
              <div className="group">{g.label}</div>
              {g.items.map(it => (
                <div key={it.id}
                     className={`item ${tab===it.id?'active':''}`}
                     onClick={() => setTab(it.id)}>
                  <span>{it.name}</span>
                  <span className="count" style={it.count==='●'?{color:'var(--amber)'}:{}}>{it.count}</span>
                </div>
              ))}
            </React.Fragment>
          ))}
        </aside>

        <main className="content">
          {tab === 'projects' && <ProjectsPage content={content} setContent={setContent} />}
          {tab === 'home'     && <HomeAdmin    content={content} setContent={setContent} />}
          {tab === 'work'     && <WorkAdmin    content={content} setContent={setContent} />}
          {tab === 'about'    && <AboutAdmin   content={content} setContent={setContent} />}
          {tab === 'press'    && <PressAdmin   content={content} setContent={setContent} />}
          {tab === 'contact'  && <ContactAdmin content={content} setContent={setContent} />}
          {tab === 'site'     && <SitePage     content={content} setContent={setContent} />}
          {tab === 'nav'      && <NavPage      content={content} setContent={setContent} />}
          {tab === 'theme'    && <ThemePage    content={content} setContent={setContent} applyTheme={applyTheme} />}
          {tab === 'footer'   && <FooterPage   content={content} setContent={setContent} />}
          {tab === 'details'  && <DetailsPage  content={content} setContent={setContent} />}
          {tab === 'publish'  && <PublishPage  content={content} defaults={defaults} onReset={resetAll} onImport={setContent} />}
          {tab === 'help'     && <HelpPage />}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
